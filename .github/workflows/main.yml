name: Portfolio Pages  
  
on:  
  push:  
    branches: [ main ]
  
jobs:  
  build-and-deploy:  
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4
          
      - name: Set up Node.js  
        uses: actions/setup-node@v3  
        with:  
          node-version: '20'
          cache: 'npm'
            
      - name: Install dependencies  
        run: npm ci  
          
      - name: Build  
        run: npm run build

      - name: Add .nojekyll
        run: touch dist/.nojekyll
          
      - name: Deploy  
        uses: JamesIves/github-pages-deploy-action@v4  
        with:  
          folder: dist
          branch: gh-pages
          clean: true
